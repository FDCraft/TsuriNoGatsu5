settings:
  allow-end: true
  warn-on-overload: false
  permissions-file: permissions.yml
  update-folder: update
  plugin-profiling: false
  connection-throttle: 4000
  query-plugins: true
  deprecated-verbose: default
  shutdown-message: 服务器停止运行,可能是遭遇崩溃等意外情况,又或者在不进行任何通知的情况下为完成需求而重启。
  minimum-api: none
  use-map-color-cache: false
spawn-limits:
  monsters: 64
  animals: 12
  water-animals: 5
  water-ambient: 3
  water-underground-creature: 3
  ambient: 2
chunk-gc:
  period-in-ticks: 400
  load-threshold: 300
ticks-per:
  animal-spawns: 400
  monster-spawns: 100
  water-spawns: 400
  water-ambient-spawns: 400
  water-underground-creature-spawns: 400
  ambient-spawns: 400
  autosave: 6000
aliases: now-in-commands.yml
